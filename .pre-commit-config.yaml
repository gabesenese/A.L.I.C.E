repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
      - id: ruff-format
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: pyright
        language: system
        types: [python]
      - id: pytest
        name: pytest
        entry: pytest tests/unit -q
        language: system
        types: [python]
        pass_filenames: false
