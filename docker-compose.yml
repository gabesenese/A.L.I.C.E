services:
  alice:
    build: .
    ports: ["8000:8000"]
    environment:
      - ALICE_OLLAMA_HOST=http://ollama:11434
      - ALICE_LOG_LEVEL=INFO
    depends_on:
      ollama:
        condition: service_healthy
      chroma:
        condition: service_started
    volumes:
      - ./data:/app/data

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  chroma:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  ollama_models:
  chroma_data:
