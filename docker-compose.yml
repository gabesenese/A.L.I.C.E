version: '3.8'

services:
  # A.L.I.C.E Main Application
  alice:
    build: .
    container_name: alice_app
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "9090:9090"
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-alice_secure_password}
      - RABBITMQ_HOST=rabbitmq
      - OLLAMA_HOST=ollama:11434
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    depends_on:
      - redis
      - postgres
      - rabbitmq
    networks:
      - alice_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis - Caching Layer
  redis:
    image: redis:7-alpine
    container_name: alice_redis
    restart: unless-stopped
    ports:
       - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - alice_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL - Primary Database
  postgres:
    image: postgres:15-alpine
    container_name: alice_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=alice
      - POSTGRES_USER=alice
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-alice_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - alice_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alice"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ - Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: alice_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=alice
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-alice_secure_password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - alice_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Celery Worker - Background Tasks
  celery_worker:
    build: .
    container_name: alice_celery_worker
    restart: unless-stopped
    command: celery -A ai.infrastructure.task_queue worker --loglevel=info --concurrency=4
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-alice_secure_password}
      - RABBITMQ_HOST=rabbitmq
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
      - rabbitmq
      - postgres
    networks:
      - alice_network

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: alice_prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - alice_network

  # Grafana - Metrics Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: alice_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus
    networks:
      - alice_network

  # Ollama - LLM Engine (Optional - if running locally)
  ollama:
    image: ollama/ollama:latest
    container_name: alice_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - alice_network

networks:
  alice_network:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  ollama_data:
