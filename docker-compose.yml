services:
  alice:
    build: .
    container_name: alice_app
    restart: unless-stopped
    command: python app/main.py
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-host.docker.internal:11434}
      - REDIS_HOST=${REDIS_HOST:-redis}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    stdin_open: true
    tty: true

  # Optional local LLM service for fully containerized runs.
  ollama:
    image: ollama/ollama:latest
    container_name: alice_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - llm

  # Optional cache backend for performance testing.
  redis:
    image: redis:7-alpine
    container_name: alice_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    profiles:
      - ops

volumes:
  ollama_data:
  redis_data:
